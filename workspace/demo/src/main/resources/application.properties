spring.application.name=demo

# Conexion a la base de datos 
spring.datasource.url=jdbc:mysql://localhost:3306/empresa?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8084


# ─── CLASE 6: Spring Boot Actuator ───────────────────────────────────────────
# En desarrollo exponemos todo; en producción usar lista blanca explícita
management.endpoints.web.exposure.include=*

# Mostrar el detalle completo del /health (incluye estado de la DB)
management.endpoint.health.show-details=always

# Activar métricas de Hibernate y del pool de conexiones HikariCP
management.metrics.enable.hibernate=true
management.metrics.enable.hikaricp=true
