# ==========================================
# BASE DE DATOS
# ==========================================

# URL de conexión a MySQL
# empresa = nombre de la base de datos
# useSSL=false = sin certificado SSL (desarrollo)
# serverTimezone=UTC = zona horaria del servidor
spring.datasource.url=jdbc:mysql://localhost:3306/empresa?useSSL=false&serverTimezone=UTC

# Usuario y contraseña de MySQL
spring.datasource.username=root
spring.datasource.password=root

# Driver (Spring Boot lo detecta solo, pero es bueno declararlo)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================

# Qué hace Hibernate con el esquema al arrancar:
# none     = no hace nada
# validate = valida que el esquema coincida con las entidades
# update   = actualiza la DB si hay cambios (desarrollo)
# create   = borra y crea todo al arrancar
# create-drop = crea al arrancar y borra al cerrar
spring.jpa.hibernate.ddl-auto=update

# Muestra las queries SQL en consola
spring.jpa.show-sql=true

# Formatea el SQL para que sea legible
spring.jpa.properties.hibernate.format_sql=true

# Muestra los valores de los parámetros en las queries
logging.level.org.hibernate.orm.jdbc.bind=trace


# ==========================================
# SERVIDOR
# ==========================================

# Puerto donde corre la aplicación (default: 8080)
server.port=8088

# ==========================================
# VALIDACIONES — mensajes personalizados
# ==========================================

# Spring usa ValidationMessages.properties por defecto
# El archivo debe estar en src/main/resources/
spring.messages.basename=ValidationMessages

# ==========================================
# ACTUATOR — monitoreo
# ==========================================

# Exponer todos los endpoints de actuator (health, metrics, env, etc.)
# En producción conviene listar solo los necesarios:
# management.endpoints.web.exposure.include=health,info,metrics
management.endpoints.web.exposure.include=*

# Path base de los endpoints (default ya es /actuator)
management.endpoints.web.base-path=/actuator

# Mostrar detalle completo en /actuator/health
# never   = solo UP o DOWN
# always  = muestra DB, disco, etc.
management.endpoint.health.show-details=always

# Info de la aplicación (aparece en /actuator/info)
info.app.nombre=Demo Empresa
info.app.version=1.0.0
info.app.descripcion=CRUD de empresas y productos con Hibernate

# ==========================================
# CONNECTION POOL — HikariCP
# ==========================================

# Conexiones mínimas mantenidas en el pool
spring.datasource.hikari.minimum-idle=2

# Conexiones máximas simultáneas
spring.datasource.hikari.maximum-pool-size=10

# Tiempo máximo de espera para obtener conexión (ms)
spring.datasource.hikari.connection-timeout=30000

# Tiempo máximo que una conexión puede estar idle (ms)
spring.datasource.hikari.idle-timeout=600000